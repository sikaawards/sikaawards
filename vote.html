<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOTE — SIKA AWARDS 2026</title>
  <meta name="theme-color" content="#0A0A0A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css?v=4">
  <link rel="icon" type="image/png" href="assets/Fav Icon/SA-logo-Normal.png">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --duel-bg: #050505;
    }
    body {
      background: var(--bg);
      color: var(--text);
      overflow: hidden; /* Empeche le scroll pendant le vote */
    }

    .vote-app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ---- PROGRESS BAR ---- */
    .vote-progress {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 4px;
      background: rgba(255,255,255,0.1);
      z-index: 1000;
    }
    .progress-bar {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ---- STATES ---- */
    .screen {
      display: none;
      height: 100%;
      width: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .screen.active { display: flex; animation: fadeIn 0.8s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---- INTRO SCREEN ---- */
    .intro-title {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      line-height: 0.9;
      margin-bottom: 20px;
    }
    .btn-start {
      background: var(--primary);
      color: #fff;
      padding: 20px 60px;
      border: none;
      font-family: var(--font-heading);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: 0.3s;
    }
    .btn-start:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--primary-glow); }

    /* ---- DUEL SCREEN ---- */
    .duel-container {
      display: flex;
      gap: 40px;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
    }
    
    .candidate {
      flex: 0 0 320px;
      width: 320px;
      position: relative;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.2, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform, opacity;
      transform: translateZ(0);
    }

    .candidate-img-box {
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      background: #000;
      position: relative;
      margin-bottom: 20px;
    }

    .candidate-img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      transition: 0.6s ease;
    }
    .candidate:hover img { filter: grayscale(0%); }

    .candidate-info {
      padding: 0;
      width: 100%;
      text-align: center;
    }
    .cand-name {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 8px;
    }
    .cand-sub {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .spotify-embed-container {
      width: 100%;
      height: 80px;
      background: #000;
      overflow: hidden;
      display: none;
      border-top: 1px solid var(--border);
    }
    .spotify-embed-container.has-content { display: block; }


    .vs-badge {
      width: 50px; height: 50px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-heading);
      font-weight: 900;
      font-style: italic;
      z-index: 10;
      font-size: 1rem;
      margin: 0 -25px;
    }

    /* ---- ANIMATIONS DUEL ---- */
    .candidate.winner { 
      transform: scale(1.1); 
      border-color: var(--border);
      box-shadow: 0 0 40px var(--primary-glow);
      z-index: 5; 
    }
    .candidate.winner img { filter: grayscale(0%); }
    .candidate.loser { opacity: 0; transform: scale(0.8); pointer-events: none; }
    
    .vote-feedback {
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-heading);
      font-size: 3rem;
      font-weight: 900;
      color: var(--primary);
      opacity: 0;
      z-index: 20;
      pointer-events: none;
      text-transform: uppercase;
      font-style: italic;
    }
    .vote-feedback.active { animation: stamp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes stamp {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(3); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    /* ---- ROUND SUMMARY SCREEN ---- */
    .summary-title { font-size: 1rem; color: var(--primary); letter-spacing: 4px; margin-bottom: 12px; }
    .summary-round { font-family: var(--font-heading); font-size: 3rem; font-weight: 900; font-style: italic; margin-bottom: 40px; }
    .survivors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 16px;
      max-width: 800px;
      width: 100%;
      margin-bottom: 40px;
    }
    .survivor-card img { width: 100%; aspect-ratio: 1; object-fit: cover; border: 1px solid var(--border); }

    /* ---- WINNER SCREEN ---- */
    .winner-label { 
      font-size: 0.7rem; 
      letter-spacing: 4px; 
      color: var(--primary); 
      margin-bottom: 20px; 
      text-transform: uppercase;
      font-weight: 700;
    }
    .winner-photo {
      width: 320px; 
      aspect-ratio: 1;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 30px;
      position: relative;
      z-index: 2;
    }
    .winner-photo img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }
    .winner-name { 
      font-family: var(--font-heading); 
      font-size: clamp(2.5rem, 8vw, 5rem); 
      font-weight: 900; 
      font-style: italic; 
      text-transform: uppercase;
      line-height: 0.85;
      margin-bottom: 40px; 
      position: relative;
      z-index: 2;
    }
    .winner-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    /* Media Queries Winner */
    @media (max-width: 768px) {
      .winner-photo { width: 240px; }
      .winner-name { font-size: 2.5rem; }
      .winner-actions { flex-direction: column; align-items: center; }
      .winner-actions button { width: 240px; }
    }
    .btn-winner-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: #fff;
      padding: 16px 32px;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 2px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-winner-ghost:hover {
      background: #fff;
      color: #000;
    }
    .btn-winner-primary {
      background: var(--primary);
      border: 1px solid var(--primary);
      color: #fff;
      padding: 16px 32px;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 2px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .btn-winner-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    /* ---- QUIT BUTTON ---- */
    .btn-quit {
      position: fixed;
      top: 30px; right: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      text-decoration: none;
      z-index: 2000;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 2px;
      opacity: 0.5;
      transition: 0.3s;
    }
    .btn-quit:hover { opacity: 1; transform: translateX(-5px); }
    .btn-quit svg { width: 18px; height: 18px; fill: #fff; }

    @media (max-width: 768px) {
      .duel-container { flex-direction: column; gap: 20px; }
      .candidate { flex: 0 0 auto; width: 260px; }
      .vs-badge { order: 2; margin: -10px 0; }
      .candidate:nth-child(1) { order: 1; }
      .candidate:nth-child(2) { order: 3; }
      .vote-feedback { top: 20px; font-size: 2rem; }
    }
  </style>
</head>
<body>

  <div class="vote-progress"><div class="progress-bar" id="pb"></div></div>

  <a href="categories.html" class="btn-quit" title="Quitter le vote">
    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    <span>QUITTER</span>
  </a>

  <div class="vote-app" id="app">
    
    <!-- INTRO -->
    <section class="screen active" id="screen-intro">
      <div class="hero-label" id="cat-label">SIKA AWARDS 2026</div>
      <h1 class="intro-title" id="cat-title">Chargement...</h1>
      <p class="hero-sub" style="margin-bottom:40px">Selectionnez votre favori a chaque duel pour elire le champion final.</p>
      <button class="btn-start" onclick="startTournament()">Commencer le vote</button>
    </section>

    <!-- DUEL -->
    <section class="screen" id="screen-duel" style="padding:0">
      <div class="vote-feedback" id="feedback">VOTÉ !</div>
      <div class="duel-container">
        <div class="candidate" id="cand-0" onclick="vote(0)">
          <div class="candidate-img-box"><img src="" alt="" id="img-0"></div>
          <div class="candidate-info">
            <div class="cand-name" id="name-0">Candidat A</div>
            <div class="cand-sub">Voter pour lui</div>
          </div>
          <div class="spotify-embed-container" id="sp-player-0"></div>
        </div>

        <div class="vs-badge">VS</div>

        <div class="candidate" id="cand-1" onclick="vote(1)">
          <div class="candidate-img-box"><img src="" alt="" id="img-1"></div>
          <div class="candidate-info">
            <div class="cand-name" id="name-1">Candidat B</div>
            <div class="cand-sub">Voter pour lui</div>
          </div>
          <div class="spotify-embed-container" id="sp-player-1"></div>
        </div>
      </div>
    </section>

    <!-- INTER-ROUND -->
    <section class="screen" id="screen-summary">
      <div class="summary-title">RÉSULTAT DU ROUND</div>
      <h2 class="summary-round" id="sum-round-name">ROUND 1 TERMINÉ</h2>
      <div class="survivors-grid" id="survivors"></div>
      <button class="btn-start" onclick="nextRound()">Round Suivant</button>
    </section>

    <!-- WINNER -->
    <section class="screen" id="screen-winner">
      <div class="hero-bg-text" style="font-size: 30vw; top: 50%; opacity: 0.02; z-index: 0;">SIKA</div>
      <div class="winner-label" style="position:relative; z-index:2;">VOTRE GAGNANT</div>
      <div class="winner-photo" style="display:block; z-index:2;">
        <img src="" alt="" id="win-img" style="display:block; width:100%; height:100%; object-fit:cover;">
      </div>
      <h1 class="winner-name" id="win-name" style="position:relative; z-index:2;">NOM DU GAGNANT</h1>
      <div class="winner-actions" style="position:relative; z-index:2;">
        <button class="btn-winner-ghost" onclick="location.reload()">Recommencer</button>
        <button class="btn-winner-primary" onclick="location.href='categories.html'">Toutes les categories</button>
      </div>
    </section>

  </div>

  <script type="module">
    import { auth, db, doc, getDoc, updateDoc, increment, collection, getDocs, query, where, runTransaction } from './scripts/firebase-config.js';

    // ---- SURVIVOR ENGINE ----
    let allCandidates = [];
    let leftCandidate = null;
    let rightCandidate = null;
    let nextCandidateIdx = 0;
    let isTransitioning = false;
    let categoryData = null;

    // 1. Initialisation
    const params = new URLSearchParams(location.search);
    const catId = params.get('cat') || 'artiste';
    const startBtn = document.querySelector('.btn-start');

    // Désactiver le bouton au début
    if(startBtn) {
      startBtn.style.opacity = "0.5";
      startBtn.disabled = true;
      startBtn.textContent = "Chargement...";
    }

    // Charger depuis Firestore
    async function loadData() {
      try {
        const docRef = doc(db, "categories", catId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          document.getElementById('cat-title').textContent = "Catégorie introuvable";
          return;
        }

        categoryData = { ...docSnap.data(), id: docSnap.id };
        
        if (!categoryData.nominees || categoryData.nominees.length < 2) {
          document.getElementById('cat-title').textContent = "Pas assez de nommés (min. 2)";
          return;
        }
        
        document.getElementById('cat-title').textContent = categoryData.title;
        allCandidates = [...categoryData.nominees];
        // On mélange pour le tournoi
        allCandidates.sort(() => Math.random() - 0.5);

        // Réactiver le bouton
        if(startBtn) {
          startBtn.style.opacity = "1";
          startBtn.disabled = false;
          startBtn.textContent = "Commencer le vote";
        }
      } catch (err) {
        console.error("Erreur chargement Firebase:", err);
        document.getElementById('cat-title').textContent = "Erreur de connexion";
      }
    }

    loadData();

    window.showScreen = function(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    window.startTournament = function() {
      if (allCandidates.length < 2) return;
      leftCandidate = allCandidates[0];
      rightCandidate = allCandidates[1];
      nextCandidateIdx = 2;
      updateProgress();
      showDuel();
    }

    function getSpotifyEmbedUrl(url) {
      if (!url || !url.includes('spotify.com')) return null;
      try {
        const cleanUrl = url.split('?')[0];
        const match = cleanUrl.match(/\/(track|album|artist|playlist)\/([a-zA-Z0-9]+)/);
        if (match) return `https://open.spotify.com/embed/${match[1]}/${match[2]}`;
        return null;
      } catch (e) { return null; }
    }

    function showDuel() {
      if (!leftCandidate || !rightCandidate) return;

      document.getElementById('name-0').textContent = leftCandidate.name;
      document.getElementById('img-0').src = leftCandidate.img || 'https://via.placeholder.com/600';
      
      document.getElementById('name-1').textContent = rightCandidate.name;
      document.getElementById('img-1').src = rightCandidate.img || 'https://via.placeholder.com/600';

      [0, 1].forEach(idx => {
        const cand = idx === 0 ? leftCandidate : rightCandidate;
        const player = document.getElementById(`sp-player-${idx}`);
        const potentialUrl = (cand.spotify && cand.spotify.includes('spotify.com')) ? cand.spotify : 
                             (cand.img && cand.img.includes('spotify.com') ? cand.img : null);
        const embedUrl = getSpotifyEmbedUrl(potentialUrl);
        if (embedUrl) {
          player.innerHTML = `<iframe src="${embedUrl}" width="100%" height="80" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>`;
          player.classList.add('has-content');
        } else {
          player.innerHTML = '';
          player.classList.remove('has-content');
        }
      });

      document.getElementById('cand-0').classList.remove('winner', 'loser');
      document.getElementById('cand-1').classList.remove('winner', 'loser');
      document.getElementById('feedback').classList.remove('active');
      
      showScreen('screen-duel');
      isTransitioning = false;
    }

    window.vote = async function(idx) {
      if (isTransitioning) return;
      isTransitioning = true;

      const winner = idx === 0 ? leftCandidate : rightCandidate;
      const winnerIdxInFullList = allCandidates.indexOf(winner);
      const loserIdx = idx === 0 ? 1 : 0;
      
      // Feedback visuel
      document.getElementById(`cand-${idx}`).classList.add('winner');
      document.getElementById(`cand-${loserIdx}`).classList.add('loser');
      document.getElementById('feedback').classList.add('active');

      // 1. SAUVEGARDE RÉELLE DANS FIRESTORE (transaction atomique)
      try {
        const catRef = doc(db, "categories", catId);
        await runTransaction(db, async (transaction) => {
          const catSnap = await transaction.get(catRef);
          if (!catSnap.exists()) return;
          const data = catSnap.data();
          const nominees = [...(data.nominees || [])];
          const realIdx = nominees.findIndex(n => n.name === winner.name);
          if (realIdx !== -1) {
            nominees[realIdx].votes = (nominees[realIdx].votes || 0) + 1;
            transaction.update(catRef, { nominees });
          }
        });
        console.log("Vote enregistré pour", winner.name);
      } catch (e) {
        console.error("Erreur enregistrement vote:", e);
      }

      setTimeout(() => {
        if (nextCandidateIdx >= allCandidates.length) {
          showWinner(winner);
          return;
        }

        const newCandidate = allCandidates[nextCandidateIdx];
        if (loserIdx === 0) leftCandidate = newCandidate;
        else rightCandidate = newCandidate;

        nextCandidateIdx++;
        updateProgress();
        showDuel();
      }, 1000);
    }

    function showWinner(winner) {
      document.getElementById('win-name').textContent = winner.name;
      document.getElementById('win-img').src = winner.img || 'https://via.placeholder.com/600';
      showScreen('screen-winner');
      
      // Petit confetti de célébration
      if (typeof confetti === 'function') {
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#FF3300', '#FFFFFF', '#FFD700'] });
      }
    }

    function updateProgress() {
      const progress = (nextCandidateIdx / allCandidates.length) * 100;
      document.getElementById('pb').style.width = Math.min(100, progress) + '%';
    }

    window.nextRound = function() {
       // Non utilisé dans ce mode "King of the Hill" continu
    }

  </script>
  <script src="scripts/main.js"></script>
  <script type="module" src="scripts/auth-ui.js"></script>
</body>
</html>
