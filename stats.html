<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Stats -- SIKA AWARDS</title>
  <meta name="theme-color" content="#0A0A0A">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css?v=6">
  <link rel="icon" type="image/png" href="assets/Fav Icon/SA-logo-Normal.png">
  <style>
    body {
      background: #050505;
      color: #fff;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      border-right: 1px solid var(--border);
      background: #080808;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 30px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo {
      height: 30px;
      margin-bottom: 20px;
    }

    .sidebar-title {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 15px;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }

    .sidebar-item {
      padding: 15px 20px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: 0.2s;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-item:hover {
      background: rgba(255,255,255,0.03);
    }

    .sidebar-item.active {
      background: rgba(255,51,0,0.05);
      border-left-color: var(--primary);
      color: var(--primary);
    }

    .item-num {
      font-size: 0.7rem;
      opacity: 0.5;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-header {
      padding: 30px 48px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-info h1 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      line-height: 1;
    }

    .btn-action {
      background: transparent;
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px 20px;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 1px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-action:hover {
      background: #fff;
      color: #000;
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      color: #fff;
    }

    .btn-danger {
      background: transparent;
      border-color: #ff3300;
      color: #ff3300;
    }

    .btn-danger:hover {
      background: #ff3300;
      color: #fff;
    }

    .content-scroll {
      flex: 1;
      padding: 48px;
      overflow-y: auto;
    }

    /* Loading */
    .loading-overlay {
      position: fixed; inset: 0; background: #000; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-heading); font-size: 2rem; font-style: italic;
    }
    
    .stat-row {
      margin-bottom: 25px;
      background: #111;
      padding: 20px;
      border-left: 4px solid var(--primary);
      border-radius: 4px;
    }
    .stat-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      align-items: center;
    }
    .stat-name {
      color: #fff;
      font-size: 1.2rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .stat-rank {
      background: var(--primary);
      color: #fff;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 0.8rem;
      font-weight: bold;
    }
    .stat-votes {
      color: var(--primary);
      font-weight: bold;
      font-size: 1.1rem;
    }
    .stat-bar-bg {
      background: #222;
      height: 12px;
      border-radius: 6px;
      overflow: hidden;
    }
    .stat-bar-fill {
      background: var(--primary);
      height: 100%;
      transition: width 0.5s ease-out;
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loading">SIKA STATS...</div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="assets/Logo_SA/SA-logo-Normal.png" alt="" class="sidebar-logo">
      <div class="sidebar-title">Categories</div>
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <!-- JS -->
    </div>
    <div style="padding: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px;">
      <button class="btn-action" style="width: 100%" onclick="window.location.href='admin.html'">← Retour à l'Admin</button>
      <button class="btn-action btn-primary" style="width: 100%" onclick="window.location.href='resultats.html'">Voir Résultats Public</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <div class="main-header" id="main-header">
      <div class="header-info">
        <h1 id="active-cat-title">Chargement...</h1>
        <p id="active-cat-votes" style="color: var(--primary); font-size: 1.2rem; font-weight: bold; margin-top: 10px;">Total Votants : 0</p>
      </div>
      <button class="btn-action btn-danger" id="btn-reset-votes" onclick="resetVotes()">Réinitialiser les votes</button>
    </div>

    <div class="content-scroll">
      <div id="stats-container">
        <!-- JS -->
      </div>
    </div>
  </main>

  <script type="module">
    import { auth, db, ADMIN_EMAILS, onAuthStateChanged, collection, getDocs, doc, updateDoc, arrayRemove } from './scripts/firebase-config.js?v=2';

    let categories = [];
    let activeCatId = null;

    onAuthStateChanged(auth, (user) => {
      if (!user || !ADMIN_EMAILS.includes(user.email)) {
        window.location.href = 'login.html?redirect=stats.html';
      } else {
        init();
      }
    });

    async function init() {
      try {
        const snap = await getDocs(collection(db, "categories"));
        categories = snap.docs.map(d => ({ ...d.data(), id: d.id }));

        categories.sort((a, b) => parseInt(a.num) - parseInt(b.num));

        if (categories.length > 0) {
          activeCatId = categories[0].id;
        }

        renderSidebar();
        renderActiveCategory();
      } catch (err) {
        console.error('Erreur init stats:', err);
        document.getElementById('loading').textContent = 'Erreur : ' + err.message;
        return;
      }
      document.getElementById('loading').style.display = 'none';
    }

    window.renderSidebar = function() {
      const list = document.getElementById('sidebar-list');
      list.innerHTML = categories.map(c => `
        <div class="sidebar-item ${c.id === activeCatId ? 'active' : ''}" onclick="selectCategory('${c.id}')">
          <div style="display:flex; align-items:center; gap:10px; overflow:hidden;">
            <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.title}</span>
            <span class="item-num">${c.num}</span>
          </div>
        </div>
      `).join('');
    };

    window.selectCategory = function(id) {
      activeCatId = id;
      renderSidebar();
      renderActiveCategory();
    };

    window.resetVotes = async function() {
      const cat = categories.find(c => c.id === activeCatId);
      if (!cat) return;

      const totalVotes = (cat.nominees || []).reduce((sum, n) => sum + (n.votes || 0), 0);
      if (totalVotes === 0) {
        alert('Aucun vote à réinitialiser dans cette catégorie.');
        return;
      }

      // 1ère confirmation
      if (!confirm(`⚠️ Être sûr de réinitialiser TOUS les votes de la catégorie "${cat.title}" ?\n\n${totalVotes} vote(s) seront supprimés.`)) return;

      // 2ème confirmation
      const typed = prompt(`Cette action est IRRÉVERSIBLE.\n\nTapez REINITIALISER pour confirmer :`);
      if (typed !== 'REINITIALISER') {
        alert('Action annulée.');
        return;
      }

      try {
        // 1. Reset des compteurs sur la catégorie
        const resetNominees = (cat.nominees || []).map(n => ({ ...n, votes: 0 }));
        await updateDoc(doc(db, 'categories', cat.id), { nominees: resetNominees });
        cat.nominees = resetNominees;

        // 2. Retirer la catégorie de voted_categories de chaque utilisateur concerné
        const usersSnap = await getDocs(collection(db, 'users'));
        const updates = [];
        usersSnap.forEach(uDoc => {
          const data = uDoc.data();
          if (Array.isArray(data.voted_categories) && data.voted_categories.includes(cat.id)) {
            updates.push(updateDoc(doc(db, 'users', uDoc.id), {
              voted_categories: arrayRemove(cat.id)
            }));
          }
        });
        await Promise.all(updates);

        renderActiveCategory();
        alert(`✅ Votes réinitialisés. ${updates.length} utilisateur(s) peuvent à nouveau voter.`);
      } catch (err) {
        console.error(err);
        alert('Erreur lors de la réinitialisation : ' + err.message);
      }
    };

    function renderActiveCategory() {
      const cat = categories.find(c => c.id === activeCatId);
      if (!cat) return;

      document.getElementById('active-cat-title').textContent = cat.title;
      
      const nominees = cat.nominees || [];
      const totalVotes = nominees.reduce((sum, n) => sum + (n.votes || 0), 0);
      
      document.getElementById('active-cat-votes').textContent = `Total Votants : ${totalVotes}`;

      const sorted = [...nominees].sort((a,b) => (b.votes||0) - (a.votes||0));
      
      const container = document.getElementById('stats-container');
      if (totalVotes === 0) {
        container.innerHTML = '<p style="text-align: center; opacity: 0.5; padding: 50px;">Aucun vote enregistré pour cette catégorie.</p>';
        return;
      }

      container.innerHTML = sorted.map((n, i) => {
        const votes = n.votes || 0;
        const percent = ((votes / totalVotes) * 100).toFixed(1);
        return `
          <div class="stat-row">
            <div class="stat-header">
              <div class="stat-name">
                <span class="stat-rank">${i+1}</span>
                ${n.name}
              </div>
              <div class="stat-votes">${votes} votes (${percent}%)</div>
            </div>
            <div class="stat-bar-bg">
              <div class="stat-bar-fill" style="width: ${percent}%;"></div>
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
